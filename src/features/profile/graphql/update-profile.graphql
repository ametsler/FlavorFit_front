mutation UpdateProfile($data: UpdateUserInput!) {
    updateProfile(data: $data) {
        id
        email,
        role,
        isEmailVerified,
        profile {
            fullName
            gender
            age
            bio
            contact
            photo
        }
        bodyMeasurement {
            height
            weight
            chest
            waist
            thigh
            arm
            goalWeight
            activityLevel
            nutritionGoal
        }
    }
}
